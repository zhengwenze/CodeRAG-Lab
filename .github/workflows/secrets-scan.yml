name: Secrets Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Scan for potential secrets in repo
        run: |
          set -euo pipefail
          echo "Running simple secret scan..."
          matches=$(grep -RIn --color=never -e 'MINIMAX_API_KEY' -e 'OPENAI_API_KEY' -e 'GITHUB_TOKEN' -e 'password' -e 'secret' -e 'api_key' -e 'JWT_SECRET' -e 'SECRET_KEY' . | wc -l)
          if [ "$matches" -gt 0 ]; then
            echo "Potential secrets found!"
            grep -RIn --color=never -e 'MINIMAX_API_KEY' -e 'OPENAI_API_KEY' -e 'GITHUB_TOKEN' -e 'password' -e 'secret' -e 'api_key' -e 'JWT_SECRET' -e 'SECRET_KEY' .
            exit 1
          else
            echo "No obvious secrets found."
          fi
